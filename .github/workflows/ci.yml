# HK-035 — reproducible install, test, build on every push/PR
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (backend)
        run: npm test

      - name: Production build (frontend)
        run: npm run build

      - name: Smoke — /health, /openapi.json, /docs
        env:
          PORT: '5059'
        run: node scripts/ci-smoke-api.js
