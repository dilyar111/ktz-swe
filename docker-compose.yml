# HK-018 — canonical stack (backend + frontend preview + simulator). From repo root:
#   docker compose up --build
#
# Browser: UI http://localhost:5173  ·  API http://localhost:5000  ·  Swagger /docs on API
# Simulator calls the API at http://backend:5000 inside the compose network.

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      CLIENT_URL: "${CLIENT_URL:-http://localhost:5173}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:5000}"
        VITE_WS_URL: "${VITE_WS_URL:-http://localhost:5000}"
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: apps/simulator/Dockerfile
    environment:
      BACKEND_URL: "${BACKEND_URL:-http://backend:5000}"
      SIM_INTERVAL_MS: "${SIM_INTERVAL_MS:-1000}"
      LOCOMOTIVE_TYPE: "${LOCOMOTIVE_TYPE:-KZ8A}"
    depends_on:
      backend:
        condition: service_healthy
